<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Informatics Quiz— Tar-Lan</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html">Tar-<span>Lan</span></a>
      <button class="nav-toggle" id="navToggleInf" aria-label="Menu" aria-expanded="false" aria-controls="navLinksInf">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinksInf">
        <a href="index.html">Home</a>
        <a href="profile.html" id="profileNav" style="display:none">Profile</a>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color theme" aria-pressed="true">
          <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
          <span class="theme-toggle__text">Dark mode</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="container py-5 has-fixed-nav">
    <h1>Informatics — Test</h1>
    <p id="testIntro" class="text-muted">Loading.</p>

    <form id="quizForm" class="quiz-form" novalidate>
      <div id="quizMount"></div>

      <div class="d-flex gap-2 mt-3">
        <button id="submitBtn" type="submit" class="btn btn-primary">Submit</button>
        <a id="backHomeBtn" class="btn btn-outline-secondary" href="index.html">Back to Home Page</a>
      </div>
    </form>

    <div id="quizResult" class="mt-4"></div>
  </main>

  <footer class="footer">
    © <span id="year"></span> Tar-Lan
  </footer>

  <!-- MathJax shared config + library for LaTeX rendering -->
  <script src="./mathjax-config.js"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script>document.querySelectorAll('#year').forEach(e=>e.textContent=new Date().getFullYear());</script>

  <!-- Общий UI/навигация/авторизация -->
  <script src="./script.js"></script>

  <!-- ТУТ: твой движок с банками — НЕ трогаем. Если он у тебя называется inftest.js, он должен быть подключён здесь -->
  <script src="./inftest.js"></script>

  <!-- Glue: вызывает startQuiz(category) из движка — см. код ниже -->
  <script src="./inftest-glue.js"></script>

  <!-- auth-connect чтобы показать ссылку profile -->
  <script src="./auth-co.js"></script>
</body>
</html>
