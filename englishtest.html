<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Quiz — Tar-Lan</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
    .level-btns .btn { min-width: 110px; }
    .quiz-card { margin-bottom: 14px; }
  </style>
</head>

<body>
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html">Tar-<span>Lan</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="navLinks">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="index.html#home">Главная</a>
        <a href="index.html#about">О проекте</a>
        <div class="lang" aria-label="Выбор языка">
          <button class="active" data-lang="ru">RU</button>
          <button data-lang="kk">KZ</button>
          <button data-lang="en">EN</button>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color theme" aria-pressed="true">
          <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
          <span class="theme-toggle__text">Dark mode</span>
        </button>
        <a class="pill" href="index.html#tests">К тестам</a>
        <div class="login" title="Войти" aria-label="Войти">🔒</div>
      </div>
    </div>
  </nav>

  <main class="py-5 has-fixed-nav">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="mb-1">English Level Check</h1>
          <p class="text-muted mb-0">The test will start automatically based on the level in the link.</p>
        </div>
      </div>

      <form id="quizForm" class="quiz-form">
        <div id="quizMount" class="mb-3"></div>
        <div class="d-flex gap-2">
          <button type="submit" id="submitBtn" class="btn btn-primary">Submit</button>
          <a id="backHome" class="btn btn-outline-secondary" href="index.html">Back to Home</a>
        </div>
      </form>

      <div id="quizResult" class="mt-4"></div>
    </div>
  </main>

  <footer class="bg-dark text-white py-4 mt-auto">
    <div class="container d-flex justify-content-between">
      <div>© <span id="year"></span> Tar-Lan</div>
      <div><a class="text-light" href="index.html">Back to home</a></div>
    </div>
  </footer>

  <!-- MathJax shared config + library for LaTeX rendering -->
  <script src="./mathjax-config.js"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script src="script.js"></script>
  <script src="englishtest.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="./auth-co.js" defer></script>
  <script src="./englishtest-glue.js"></script>
</body>
</html>
