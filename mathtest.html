<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Math Quiz — Tar-Lan</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .type-btns .btn { min-width: 110px; }
    .quiz-card { margin-bottom: 14px; }
    .quiz-img { text-align: center; }
    .quiz-img img {
      max-width: 220px;
      max-height: 180px;
      width: 100%;
      height: auto;
      border-radius: 10px;
      display: inline-block;
      object-fit: contain;
      box-shadow: 0 8px 18px rgba(15,23,42,.25);
    }
    /* Result panel: gradient card with subtle animation */
    .result-panel {
      background: radial-gradient(circle at top, rgba(59,130,246,.25), rgba(15,23,42,.95));
      border-radius: 20px;
      padding: 30px 26px;
      color: #e0f2fe;
      text-align: center;
      box-shadow: 0 24px 60px rgba(15,23,42,.55);
      border: 1px solid rgba(59,130,246,.35);
      margin-top: 24px;
      opacity: 0;
      transform: translateY(20px);
      animation: resultPop .6s ease forwards;
    }
    .result-panel.result-a {
      background: linear-gradient(135deg, #064e3b, #059669);
      border-color: rgba(16,185,129,.8);
    }
    .result-panel.result-b {
      background: linear-gradient(135deg, #0f4c5c, #16a34a);
      border-color: rgba(34,197,94,.75);
    }
    .result-panel.result-c {
      background: linear-gradient(135deg, #7c2d12, #f59e0b);
      border-color: rgba(251,191,36,.8);
      color: #1f2937;
    }
    .result-panel.result-d {
      background: linear-gradient(135deg, #78350f, #f97316);
      border-color: rgba(249,115,22,.8);
    }
    .result-panel.result-f {
      background: linear-gradient(135deg, #312e81, #4b5563, #111827);
      border-color: rgba(148,163,184,.6);
    }
    .grade-badge {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.65);
      border-radius: 16px;
      padding: 12px 18px;
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: inset 0 0 12px rgba(59,130,246,.35);
      margin-bottom: 18px;
    }
    .grade-letter {
      font-size: clamp(2.2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: 2px;
    }
    .grade-percent {
      font-size: 1rem;
      opacity: .85;
    }
    .grade-emoji {
      font-size: clamp(2rem, 6vw, 3rem);
      margin: 8px 0;
    }
    .grade-headline {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 6px 0;
    }
    .grade-message {
      font-size: 1.1rem;
      margin-bottom: 6px;
    }
    .grade-advice {
      font-size: 0.95rem;
      color: #bfdbfe;
    }
    .result-details {
      text-align: left;
      margin-top: 18px;
      background: rgba(15,23,42,.55);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,.12);
    }
    .result-panel.result-c .result-details,
    .result-panel.result-f .result-details {
      background: rgba(255,255,255,.65);
      border-color: rgba(15,23,42,.15);
      color: #0f172a;
    }
    .result-details h4 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1rem;
      color: #e0f2fe;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .result-detail-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }
    .q-chip {
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(15,23,42,.35);
      box-shadow: inset 0 0 10px rgba(255,255,255,.04);
    }
    .result-panel.result-c .q-chip,
    .result-panel.result-f .q-chip {
      background: rgba(255,255,255,.75);
      border-color: rgba(15,23,42,.12);
      box-shadow: none;
    }
    .q-chip__label {
      font-weight: 700;
      font-size: .95rem;
      min-width: 44px;
      text-align: center;
      padding: 6px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.15);
    }
    .q-chip__text {
      flex: 1;
      font-size: .95rem;
      line-height: 1.4;
    }
    .q-chip.is-correct {
      border-color: rgba(34,197,94,.6);
      background: rgba(34,197,94,.08);
    }
    .q-chip.is-correct .q-chip__label {
      background: rgba(34,197,94,.2);
      border-color: rgba(34,197,94,.5);
    }
    .q-chip.is-wrong {
      border-color: rgba(248,113,113,.6);
      background: rgba(248,113,113,.08);
    }
    .q-chip.is-wrong .q-chip__label {
      background: rgba(248,113,113,.2);
      border-color: rgba(248,113,113,.5);
    }
    .result-actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    @keyframes resultPop {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @media (max-width: 600px) {
      .result-panel {
        padding: 22px 18px;
      }
      .result-details {
        padding: 14px;
      }
    }
  </style>
  </head>
<body>
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html">Tar-<span>Lan</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="navLinks">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="index.html#home">Главная</a>
        <a href="index.html#about">О проекте</a>
          <div class="lang" aria-label="Выбор языка">
            <button class="active" data-lang="ru">RU</button>
            <button data-lang="kk">KZ</button>
            <button data-lang="en">EN</button>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color theme" aria-pressed="true">
            <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
            <span class="theme-toggle__text">Dark mode</span>
          </button>
          <a class="pill" href="index.html#tests">К тестам</a>
          <div class="login" title="Войти" aria-label="Войти">🔒</div>
        </div>
      </div>
    </nav>

  <main class="py-5 has-fixed-nav">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="mb-1">Math Diagnostic</h1>
          <p class="text-muted mb-0">The test will start automatically according to the selected mode in the link.</p>
        </div>
      </div>

      <form id="quizForm" class="quiz-form">
        <div id="quizMount" class="mb-3"></div>
        <div class="d-flex gap-2">
          <button type="submit" id="submitBtn" class="btn btn-primary">Submit</button>
          <a id="backHome" class="btn btn-outline-secondary" href="index.html">Back to Home</a>
        </div>
      </form>

      <div id="quizResult" class="mt-4"></div>
    </div>
  </main>

  <footer class="bg-dark text-white py-4 mt-auto">
    <div class="container d-flex justify-content-between">
      <div>© <span id="year"></span> Tar-Lan</div>
      <div><a class="text-light" href="index.html">Back to home</a></div>
    </div>
  </footer>

  <!-- MathJax shared config + library for LaTeX rendering -->
  <script src="./mathjax-config.js"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script src="script.js"></script>
  <script src="mathtest.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="./auth-co.js" defer></script>
</body>
</html>
